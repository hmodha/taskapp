name: taskapp
description: A smart task scheduling and reminder app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^14.0.2

  # ── Local database ─────────────────────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Notifications ──────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # ── Internationalisation ───────────────────────────────────────────────────
  intl: '>=0.17.0 <1.0.0'

  # ── Config loading ─────────────────────────────────────────────────────────
  flutter_cache_manager: ^3.4.1

  # ── Utilities ──────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code generation ────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/config/categories/

  generate: true